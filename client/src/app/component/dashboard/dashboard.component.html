<header class="navbar">

  <nav class="navbar-container">

    <div class="nav-logo">
      <span class="logo-icon">🍽</span>
      <span class="logo-text">RMS Dashboard</span>
    </div>

    <ul class="nav-links">
      <li><a href="#restaurants">Restaurants</a></li>
      <li *ngIf="isAdminUser"><a href="#orders">Orders</a></li>
      <li *ngIf="isAdminUser"><a href="#feedbacks">Feedbacks</a></li>
    </ul>

    <div class="nav-user">
      <div class="user-info">
        <span class="username">{{currentUser?.username}}</span>
        <span class="role">{{currentUser?.role}}</span>
      </div>
      <div class="avatar">{{currentUser?.username?.charAt(0)}}</div>
    </div>

  </nav>

</header>

<main class="dashboard-content">

  <!-- HERO -->
  <section class="hero-card glass-card">
    <div class="hero-content">
      <h2>Restaurant Management System</h2>
      <p>Manage restaurants, orders, menu items and customer interactions through one centralized dashboard</p>
    </div>
  </section>

  <!-- ✅ RESTAURANT WITH MENU INSIDE -->
  <section id="restaurants" class="dashboard-section glass-card">
    <app-restaurant></app-restaurant>
  </section>

  <!-- ✅ ORDERS -->
  <section id="orders" class="dashboard-section glass-card" *ngIf="isAdminUser">
    <app-order></app-order>
  </section>

  <!-- ✅ FEEDBACK -->
  <section id="feedbacks" class="dashboard-section glass-card" *ngIf="isAdminUser">
    <app-feedback></app-feedback>
  </section>

</main>
