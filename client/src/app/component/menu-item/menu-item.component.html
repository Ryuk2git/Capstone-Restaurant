<nav class="navbar navbar-dark bg-dark px-4">
  <a routerLink="/dashboard" class="btn btn-outline-light btn-sm">
    Back
  </a>

  <span class="navbar-brand">
    Menu Item Management
  </span>
</nav>

<div class="container mt-4">
  <div *ngIf="message" class="alert alert-success">
    {{ message }}
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <div class="card shadow p-4 mb-4">
    <h4 class="mb-3">
      {{ editingId ? 'Update Menu Item' : 'Add Menu Item' }}
    </h4>

    <form [formGroup]="menuForm" (ngSubmit)="saveMenuItem()">
      <div class="row">
        <div class="col-md-4 mb-3">
          <label class="form-label">Item Name</label>
          <input
            type="text"
            class="form-control"
            formControlName="name"
            placeholder="Menu item name"
          />
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label">Menu Type</label>
          <select class="form-select" formControlName="menuType">
            <option value="Veg">Veg</option>
            <option value="Non-Veg">Non-Veg</option>
          </select>
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label">Price</label>
          <input
            type="number"
            class="form-control"
            formControlName="price"
            placeholder="Price"
          />
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label">Quantity</label>
          <input
            type="number"
            class="form-control"
            formControlName="quantity"
            placeholder="Quantity"
          />
        </div>

        <div class="col-md-8 mb-3">
          <label class="form-label">Restaurant</label>
          <select class="form-select" formControlName="restaurantId">
            <option value="">Select Restaurant</option>
            <option
              *ngFor="let restaurant of restaurants"
              [value]="restaurant.id"
            >
              {{ restaurant.name }} - {{ restaurant.location }}
            </option>
          </select>
        </div>
      </div>

      <button type="submit" class="btn btn-success">
        {{ editingId ? 'Update' : 'Add' }}
      </button>

      <button
        type="button"
        class="btn btn-secondary ms-2"
        (click)="resetForm()"
      >
        Clear
      </button>
    </form>
  </div>

  <div class="card shadow p-4">
    <div class="d-flex mb-3">
      <input
        type="text"
        class="form-control me-2"
        placeholder="Search menu item"
        [(ngModel)]="searchText"
      />

      <button type="button" class="btn btn-dark" (click)="search()">
        Search
      </button>
    </div>

    <div class="table-responsive">
      <table class="table table-bordered table-striped align-middle">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Type</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Restaurant</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let item of menuItems">
            <td>{{ item.id }}</td>
            <td>{{ item.name }}</td>
            <td>{{ item.menuType }}</td>
            <td>₹{{ item.price }}</td>
            <td>{{ item.quantity }}</td>
            <td>{{ item.restaurant?.name }}</td>
            <td>
              <button
                type="button"
                class="btn btn-sm btn-warning me-2"
                (click)="editMenuItem(item)"
              >
                Edit
              </button>

              <button
                type="button"
                class="btn btn-sm btn-danger"
                (click)="deleteMenuItem(item.id)"
              >
                Delete
              </button>
            </td>
          </tr>

          <tr *ngIf="menuItems.length === 0">
            <td colspan="7" class="text-center">
              No menu items found.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
